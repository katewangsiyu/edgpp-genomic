name: t4_debug
hardware: T4
device: cuda
precision: fp16
seed: 42

teacher:
  kind: fake
  n_tracks: 16
  n_filters: 64

student:
  kind: compact_cnn
  n_tracks: 16
  hidden: 64
  n_layers: 4

reliability:
  kind: mlp
  input_dim: 3
  hidden: [64, 32]

data:
  snp_subset_path: data/debug/snp_100.parquet
  fasta_path: data/raw/hg38.fa
  seq_len: 32768
  batch_size: 1
  num_workers: 0
  side_feature_cols: [teacher_var, maf, phylop]
  label_col: coef

training:
  lr: 3.0e-4
  n_epochs: 1
  max_steps: 50
  grad_checkpoint: false
  gate_threshold: 0.5
  gate_adaptive: false
  lambda_task: 0.1

logging:
  log_every_n_steps: 5
  save_dir: outputs/t4_debug
