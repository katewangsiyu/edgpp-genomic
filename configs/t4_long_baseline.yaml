name: t4_long_baseline
hardware: T4
device: cuda
precision: fp16
seed: 42

teacher:
  kind: precomputed
  n_tracks: 6

student:
  kind: compact_cnn
  n_tracks: 6
  hidden: 64
  n_layers: 4

reliability:
  kind: mlp
  input_dim: 3
  hidden: [64, 32]

data:
  kind: traitgym
  test_parquet: data/raw/traitgym/mendelian_traits_matched_9/test.parquet
  teacher_parquet: data/raw/traitgym/mendelian_traits_matched_9/features/Borzoi_L2_L2.parquet
  fasta_path: data/raw/hg38.fa
  seq_len: 32768
  batch_size: 16            # measured peak 2.1 GB on T4 — plenty of headroom
  num_workers: 0
  max_rows: null

training:
  lr: 3.0e-4
  n_epochs: 200             # let max_steps dominate
  max_steps: 5000
  grad_checkpoint: false
  gate_threshold: 0.5
  gate_adaptive: true
  gate_adaptive_alpha: 0.5
  lambda_task: 0.1
  w_reg_lambda: 0.05
  w_reg_target: 0.5

logging:
  log_every_n_steps: 100
  save_dir: outputs/long_baseline
